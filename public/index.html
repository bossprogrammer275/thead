<!DOCTYPE html>
<html lang="en">

<head>
    <script>(function (s) { s.dataset.zone = '11066825', s.src = 'https://n6wxm.com/vignette.min.js' })([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Web Scraper</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 40px;
            background-color: #f9f9f9;
            color: #333;
        }

        max-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        h1 {
            color: #111;
            border-bottom: 2px solid #eaeaea;
            padding-bottom: 10px;
            margin-top: 0;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        a {
            color: #0066cc;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }

        .loading {
            color: #666;
            font-style: italic;
        }
    </style>
</head>

<body>

    <div class="max-container">
        <h1>Latest Scraped News</h1>
        <p id="status" class="loading">Fetching fresh data from the server...</p>
        <ul id="news-list"></ul>
    </div>

    <script>
        // Run this function automatically when the page loads
        async function loadNews() {
            try {
                const response = await fetch('/api/news');
                const data = await response.json();

                const listContainer = document.getElementById('news-list');
                const statusText = document.getElementById('status');

                // Clear the loading message
                statusText.style.display = 'none';

                // Loop through the data and build the HTML elements manually
                data.forEach(item => {
                    const li = document.createElement('li');
                    const a = document.createElement('a');

                    a.href = item.url;
                    a.target = '_blank';
                    a.textContent = item.title;

                    li.appendChild(a);
                    listContainer.appendChild(li);
                });

            } catch (error) {
                document.getElementById('status').textContent = "Error loading data.";
                console.error("Fetch error:", error);
            }
        }

        loadNews();
    </script>
</body>

</html>
