<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIND — Admin Dashboard</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            brand: {
              orange: '#EA580C',
              'orange-hover': '#C2410C',
              'orange-light': '#F97316',
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen">

  <!-- Background -->
  <div class="fixed inset-0 pointer-events-none" style="background: radial-gradient(ellipse at 50% 0%, rgba(109,40,217,0.12) 0%, transparent 55%);"></div>

  <!-- Password Overlay -->
  <div id="password-overlay" class="password-overlay">
    <div class="text-center px-5 w-full max-w-xs animate-scale-in">
      <h1 class="hero-title text-5xl mb-2">FIND</h1>
      <p class="text-purple-400 text-sm mb-8">Admin Access</p>

      <div class="relative">
        <input
          type="password"
          id="password-input"
          class="search-input text-center text-sm"
          placeholder="Enter password"
          autocomplete="off"
        >
      </div>

      <p id="password-error" class="text-red-400 text-xs mt-3 hidden">Wrong password.</p>

      <button onclick="checkPassword()" class="btn-orange w-full mt-4 justify-center">
        Enter Dashboard
      </button>
    </div>
  </div>

  <!-- Dashboard (hidden until auth) -->
  <div id="dashboard" class="hidden relative z-10">

    <!-- Top Bar -->
    <header class="border-b border-purple-800/40 bg-purple-950/80 backdrop-blur-md sticky top-0 z-30">
      <div class="max-w-6xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <a href="index.html" class="text-xl font-black tracking-tight text-white hover:text-purple-300 transition-colors">FIND</a>
          <span class="badge badge-orange text-[10px]">ADMIN</span>
        </div>
        <button onclick="loadAnalytics()" class="text-xs text-purple-400 hover:text-white transition-colors flex items-center gap-1.5">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          Refresh
        </button>
      </div>
    </header>

    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-6 space-y-6">

      <!-- Stats Row -->
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <div class="glass-card p-4 text-center">
          <p class="text-2xl font-bold text-white" id="stat-total">0</p>
          <p class="text-xs text-purple-400 mt-1">Total Tools</p>
        </div>
        <div class="glass-card p-4 text-center">
          <p class="text-2xl font-bold text-brand-orange" id="stat-views">0</p>
          <p class="text-xs text-purple-400 mt-1">Total Clicks</p>
        </div>
        <div class="glass-card p-4 text-center">
          <p class="text-2xl font-bold text-amber-400" id="stat-avg-rating">0.0</p>
          <p class="text-xs text-purple-400 mt-1">Avg User Rating</p>
        </div>
        <div class="glass-card p-4 text-center">
          <p class="text-lg font-bold text-white truncate" id="stat-top-tool">—</p>
          <p class="text-xs text-purple-400 mt-1">Most Clicked</p>
        </div>
      </div>

      <!-- Add / Edit Form -->
      <div class="glass-card p-5 sm:p-6">
        <div class="flex items-center justify-between mb-5">
          <h2 id="form-title" class="text-base font-bold text-white">Add New Tool</h2>
          <button id="cancel-btn" onclick="cancelEdit()" class="hidden text-xs text-purple-400 hover:text-white transition-colors">
            ✕ Cancel Edit
          </button>
        </div>

        <form id="tool-form" class="space-y-4">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label class="form-label" for="field-name">Tool Name *</label>
              <input type="text" id="field-name" class="form-input" placeholder="e.g. Excalidraw" required>
            </div>
            <div>
              <label class="form-label" for="field-link">Link (URL) *</label>
              <input type="url" id="field-link" class="form-input" placeholder="https://example.com" required>
            </div>
          </div>

          <div>
            <label class="form-label" for="field-intro">Short Intro</label>
            <textarea id="field-intro" class="form-input" rows="2" placeholder="A brief description of the tool..."></textarea>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div>
              <label class="form-label" for="field-rating">Admin Rating (0-5)</label>
              <input type="number" id="field-rating" class="form-input" min="0" max="5" step="0.5" placeholder="4.5">
            </div>
            <div>
              <label class="form-label" for="field-bestfor">Best For</label>
              <input type="text" id="field-bestfor" class="form-input" placeholder="Quick wireframing">
            </div>
            <div>
              <label class="form-label" for="field-weakness">Weakness</label>
              <input type="text" id="field-weakness" class="form-input" placeholder="No free collaboration">
            </div>
          </div>

          <div>
            <label class="form-label" for="field-verdict">FIND Verdict</label>
            <textarea id="field-verdict" class="form-input" rows="2" placeholder="Your expert verdict on this tool..."></textarea>
          </div>

          <div>
            <label class="form-label" for="field-tags">Tags (comma-separated)</label>
            <input type="text" id="field-tags" class="form-input" placeholder="whiteboard, design, sketch">
          </div>

          <div class="flex items-center gap-3 pt-2">
            <button type="submit" id="submit-btn" class="btn-orange">
              Add Tool
            </button>
          </div>
        </form>
      </div>

      <!-- Tools Table -->
      <div class="glass-card overflow-hidden">
        <div class="px-5 py-4 border-b border-purple-800/30">
          <h2 class="text-base font-bold text-white">All Tools</h2>
        </div>
        <div class="overflow-x-auto">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Tool</th>
                <th>Clicks</th>
                <th>Ratings</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="table-body">
              <tr>
                <td colspan="5" class="text-center py-8 text-purple-500 text-sm">
                  Loading...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>

    <!-- Footer -->
    <footer class="text-center py-6 px-5">
      <div class="flex items-center justify-center gap-4 text-xs text-purple-600">
        <span>&copy; 2026 FIND</span>
        <span class="w-px h-3 bg-purple-800"></span>
        <a href="index.html" class="hover:text-purple-400 transition-colors">Back to Search</a>
      </div>
    </footer>

  </div>

  <script src="js/admin.js"></script>
</body>
</html>
